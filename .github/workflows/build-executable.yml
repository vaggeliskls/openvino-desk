name: Build Executable

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ui/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Copy app icons
        run: |
          New-Item -ItemType Directory -Force -Path ui\build\windows | Out-Null
          Copy-Item ui\appicon.png ui\build\appicon.png
          Copy-Item ui\logo.ico ui\build\windows\icon.ico

      - name: Install UPX
        run: choco install upx -y

      - name: Build executable
        run: cd ui && wails build -upx -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: Rename executable with tag
        run: Move-Item ui\build\bin\openvino-desktop.exe ui\build\bin\openvino-desktop-${{ github.ref_name }}.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ui/build/bin/openvino-desktop-${{ github.ref_name }}.exe
