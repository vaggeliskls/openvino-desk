name: Build Export Environment (Windows)

on:
  push:
    tags:
      - "export*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: UV export environment
        shell: pwsh
        run: |
          uv python install 3.12 --install-dir python
          $pyExe = (Get-ChildItem python\cpython-* -Filter python.exe -Recurse | Select-Object -First 1).FullName
          uv venv export --python $pyExe --relocatable
          uv pip install --python export\Scripts\python.exe -r export-model\requirements.txt

      - name: Zip export and python folders
        run: Compress-Archive -Path export, python -DestinationPath export-windows.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} export-windows.zip
