name: Build Export Environment (Windows)

on:
  push:
    tags:
      - 'export*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create virtual environment
        run: uv venv export --python 3.12

      - name: Install dependencies
        run: uv pip install --python export\Scripts\python.exe -r export-model\requirements.txt

      - name: Zip export folder
        run: Compress-Archive -Path export -DestinationPath export-windows.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} export-windows.zip
