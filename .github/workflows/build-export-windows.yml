name: Build Export Environment (Windows)

on:
  push:
    tags:
      - "export*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: UV export environment
        shell: pwsh
        run: |
          uv python install 3.12 --install-dir python-tmp
          Remove-Item export -Recurse -Force -ErrorAction SilentlyContinue
          Move-Item (Get-ChildItem python-tmp\cpython-* | Select-Object -First 1).FullName export
          Remove-Item python-tmp -Recurse -Force
          Remove-Item export\Lib\EXTERNALLY-MANAGED -Force -ErrorAction SilentlyContinue
          uv pip install --python export\python.exe -r export-model\requirements.txt

      - name: Zip export folder
        run: Compress-Archive -Path export -DestinationPath export-windows.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} export-windows.zip
